---
clusterName: home-cluster
talosVersion: v1.8.2
kubernetesVersion: v1.26.15
endpoint: https://10.66.1.30:6443
allowSchedulingOnMasters: false
additionalApiServerCertSans: &san
  - "127.0.0.1" # KubePrism
additionalMachineCertSans: *san
cniConfig:
  name: none
patches:
    # Disable search domain everywhere
  - |-
    machine:
      network:
        disableSearchDomain: true

  # Disable Host DNS
  - |-
    machine:
      features:
        hostDNS:
          enabled: true
          resolveMemberNames: true
          forwardKubeDNSToHost: false
  # Kubelet configuration
  - |-
    machine:
      kubelet:
        extraArgs:
          rotate-server-certificates: "true"
  # NTP
  - |-
    machine:
      time:
        disabled: false
        servers:
          - 10.66.1.1
  # Custom sysctls
  - |-
    machine:
      sysctls:
        fs.inotify.max_queued_events: "65536"
        fs.inotify.max_user_instances: "8192"
        fs.inotify.max_user_watches: "524288"
        net.core.rmem_max: "7500000"
        net.core.wmem_max: "7500000"
  # Various udev rules
  - |-
    machine:
      udev:
        rules:
          # Intel GPU
          - SUBSYSTEM=="drm", KERNEL=="renderD*", GROUP="44", MODE="0660"
nodes:
  # control-plane
  - hostname: kube-cp-01
    ipAddress: 10.66.1.31
    controlPlane: true
    installDisk: /dev/nvme0n1
    nameservers:
      - 10.67.0.3
    networkInterfaces:
      - interface: eth0
        addresses:
          - 10.66.1.31/24
        routes:
          - network: 0.0.0.0/0
            gateway: 10.66.1.1
        vip:
          ip: 10.66.1.30
  - hostname: kube-cp-02
    ipAddress: 10.66.1.32
    controlPlane: true
    installDisk: /dev/nvme0n1
    nameservers:
      - 10.67.0.3
    networkInterfaces:
      - interface: eth0
        addresses:
          - 10.66.1.32/24
        routes:
          - network: 0.0.0.0/0
            gateway: 10.66.1.1
        vip:
          ip: 10.66.1.30
  - hostname: kube-cp-03
    ipAddress: 10.66.1.33
    controlPlane: true
    installDisk: /dev/nvme0n1
    nameservers:
      - 10.67.0.3
    networkInterfaces:
      - interface: eth0
        addresses:
          - 10.66.1.33/24
        routes:
          - network: 0.0.0.0/0
            gateway: 10.66.1.1
        vip:
          ip: 10.66.1.30
  # workers
  - hostname: kube-worker-01
    ipAddress: 10.66.1.41
    controlPlane: false
    installDiskSelector:
      size: "<= 256GB"
    machineDisks:
      - device: /dev/disk/by-id/ata-Samsung_SSD_860_EVO_1TB_S3ZNB0M133468Z
        partitions:
          - mountpoint: /var/mnt/longhorn/ssd
            size: 500 GB
          - mountpoint: /var/mnt/local-host/ssd
            size: 500 GB
      - device: /dev/disk/by-id/nvme-Samsung_SSD_980_PRO_1TB_S5P2NL0T803499R
        partitions:
          - mountpoint: /var/mnt/local-host/nvme
    nameservers:
      - 10.67.0.3
    networkInterfaces:
      - interface: eth0
        addresses:
          - 10.66.1.41/24
        routes:
          - network: 0.0.0.0/0
            gateway: 10.66.1.1
  - hostname: kube-worker-02
    ipAddress: 10.66.1.42
    controlPlane: false
    installDiskSelector:
      size: "<= 256GB"
    machineDisks:
      - device: /dev/disk/by-id/ata-Samsung_SSD_860_EVO_1TB_S3Z8NB0KA35961Z
        partitions:
          - mountpoint: /var/mnt/longhorn/ssd
            size: 500 GB
          - mountpoint: /var/mnt/local-host/ssd
            size: 500 GB
      - device: /dev/disk/by-id/nvme-Samsung_SSD_980_PRO_1TB_S5P2NL0T803514W
        partitions:
          - mountpoint: /var/mnt/local-host/nvme
    nameservers:
      - 10.67.0.3
    networkInterfaces:
      - interface: eth0
        addresses:
          - 10.66.1.42/24
        routes:
          - network: 0.0.0.0/0
            gateway: 10.66.1.1
  - hostname: kube-worker-03
    ipAddress: 10.66.1.43
    controlPlane: false
    installDiskSelector:
      size: "<= 256GB"
    machineDisks:
      - device: /dev/disk/by-id/ata-Samsung_SSD_860_EVO_1TB_FIXME
        partitions:
          - mountpoint: /var/mnt/longhorn/ssd
            size: 500 GB
          - mountpoint: /var/mnt/local-host/ssd
            size: 500 GB
      - device: /dev/disk/by-id/nvme-Samsung_SSD_980_PRO_1TB_S5P2NL0W402172T
        partitions:
          - mountpoint: /var/mnt/local-host/nvme
    nameservers:
      - 10.67.0.3
    networkInterfaces:
      - interface: eth0
        addresses:
          - 10.66.1.42/24
        routes:
          - network: 0.0.0.0/0
            gateway: 10.66.1.1

controlPlane:
  schematic:
    customization:
      extraKernelArgs:
        - net.ifnames=0
      systemExtensions:
        officialExtensions:
          - siderolabs/intel-ucode
          - siderolabs/i915-ucode
  patches:
    # Cluster configuration
    - |-
      cluster:
        proxy:
          disabled: true
        coreDNS:
            disabled: true
        discovery:
          enabled: true
          registries:
            kubernetes:
              disabled: false
            service:
              disabled: true
        scheduler:
          extraArgs:
            bind-address: 0.0.0.0
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
worker:
  schematic:
    customization:
      extraKernelArgs:
        - net.ifnames=0
      systemExtensions:
        officialExtensions:
          - siderolabs/intel-ucode
          - siderolabs/i915-ucode
  patches:
    # Configure nfs mount options
    - |
      machine:
        files:
          - op: overwrite
            path: /etc/nfsmount.conf
            permissions: 0o644
            content: |
              [ NFSMount_Global_Options ]
              nfsvers=4.2
              hard=True
              noatime=True
              nodiratime=True
              rsize=131072
              wsize=131072
              nconnect=8
