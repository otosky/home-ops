---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: cluster-apps-minio-operator
  namespace: flux-system
spec:
  path: ./kubernetes/apps/minio/minio/operator
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-ops-kubernetes
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta1
      kind: HelmRelease
      name: minio-operator
      namespace: minio-operator
  interval: 30m
  retryInterval: 1m
  timeout: 3m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: cluster-apps-minio-tenant
  namespace: flux-system
spec:
  dependsOn:
    - name: cluster-apps-minio-operator
  path: ./kubernetes/apps/minio/minio/tenant
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-ops-kubernetes
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta1
      kind: HelmRelease
      name: minio-tenant
      namespace: minio
  interval: 30m
  retryInterval: 1m
  timeout: 5m
