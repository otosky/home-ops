apiVersion: v1
kind: ServiceAccount
metadata:
  name: nfs-checker-sa
  namespace: media
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: restart-pods-with-stale-nfs-mount
  namespace: media
spec:
  concurrencyPolicy: Allow
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      parallelism: 1
      template:
        spec:
          containers:
          - image: docker.io/bitnami/kubectl:1.31.4
            imagePullPolicy: IfNotPresent
            name: pod-command-container
            command:
            - /bin/bash
            - -c
            - |
              kubectl exec kaizoku-0 -- ls /data ||
              { kubectl delete pods kaizoku-0 komga-0 navidrome-0; kubectl delete pods -l app.kubernetes.io/name=unpackerr; }
          restartPolicy: OnFailure
          serviceAccount: nfs-checker-sa
          serviceAccountName: nfs-checker-sa
          terminationGracePeriodSeconds: 30
  schedule: '*/10 * * * *'
  successfulJobsHistoryLimit: 3
  suspend: false
