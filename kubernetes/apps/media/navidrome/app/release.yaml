apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: navidrome
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 2.2.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
      containers:
        main:
          image:
            repository: deluan/navidrome
            tag: sha-4f9418b
          env:
            TZ: America/New_York
            ND_DATAFOLDER: /config
            ND_ENABLEGRAVATAR: "true"
            ND_LOGLEVEL: info
            ND_MUSICFOLDER: /music
            ND_PORT: &port 80
            ND_PROMETHEUS_ENABLED: "true"
            ND_SCANSCHEDULE: "@every 1h"
          envFrom:
            - secretRef:
                name: navidrome-secret
          resources:
            requests:
              cpu: 10m
              memory: 250Mi
            limits:
              memory: 750Mi
      pod:
        securityContext:
          runAsUser: 568
          runAsGroup: 568
          fsGroup: 568
          fsGroupChangePolicy: "OnRootMismatch"
          supplementalGroups: [10000]
      statefulset:
        volumeClaimTemplates:
          - name: config
            mountPath: /config
            accessMode: ReadWriteOnce
            size: 5Gi
            storageClass: longhorn-ssd
    service:
      main:
        ports:
          http:
            port: *port
    serviceMonitor:
      main:
        enabled: true
    persistence:
      lidarr:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media
        subPath: media/music
        mountPath: /music/lidarr
        readOnly: true
      bandcamp:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: media
        subPath: data/bandcamp
        mountPath: /music/bandcamp
        readOnly: true
