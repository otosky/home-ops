apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: navidrome
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 1.2.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controller:
      type: statefulset
      annotations:
        reloader.stakater.com/auto: "true"
    image:
      repository: ghcr.io/onedr0p/navidrome
      tag: 0.48.0@sha256:3a7f99b239a46a8be7c98c460fee7ddd5bc5d54721cb152c35abc45d5143cff0
    env:
      TZ: America/New_York
      ND_DATAFOLDER: /config
      ND_ENABLEGRAVATAR: "true"
      ND_LOGLEVEL: info
      ND_MUSICFOLDER: /music
      ND_PORT: &port 80
      ND_PROMETHEUS_ENABLED: "true"
      # ND_REVERSEPROXYUSERHEADER: "Remote-User"
      # ND_REVERSEPROXYWHITELIST: "${NET_POD_CIDR}"
      ND_SCANSCHEDULE: "@every 1h"
    envFrom:
      - secretRef:
          name: navidrome-secret
    service:
      main:
        ports:
          http:
            port: *port
    serviceMonitor:
      main:
        enabled: true
    podSecurityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
      fsGroupChangePolicy: "OnRootMismatch"
      supplementalGroups: [10000]
    persistence:
      config:
        enabled: true
        type: pvc
        storageClass: longhorn-ssd
        size: 5Gi
      lidarr:
        enabled: true
        type: nfs
        server: nas.home.arpa
        path: /mnt/user/data/media/music
        mountPath: /music/lidarr
        readOnly: true
      bandcamp:
        enabled: true
        type: nfs
        server: nas.home.arpa
        path: /mnt/user/data/bandcamp
        mountPath: /music/bandcamp
        readOnly: true
    resources:
      requests:
        cpu: 10m
        memory: 250Mi
      limits:
        memory: 750Mi
