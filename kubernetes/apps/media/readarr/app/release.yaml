---
# yaml-language-server: $schema=https://kubernetes-schemas.toskbot.xyz/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: &app readarr
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 2.2.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    controllers:
      main:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          main:
            image:
              repository: ghcr.io/onedr0p/readarr-nightly
              tag: 0.3.10.2287@sha256:ae46e0be25950f3d90dfb50bbae8bb9c45e4ab1daa9bbe99bdf7054212a9c984
            env:
              READARR__INSTANCE_NAME: Readarr
              READARR__LOG_LEVEL: info
              READARR__PORT: &port 8787
              READARR__APPLICATION_URL: "https://readarr.toskbot.xyz"
            envFrom:
              - secretRef:
                  name: readarr-secret
            resources:
              requests:
                cpu: 10m
                memory: 1200Mi
              limits:
                memory: 2000Mi
        pod:
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: "OnRootMismatch"
            supplementalGroups:
              - 100
        statefulset:
          volumeClaimTemplates:
            - name: config
              mountPath: /config
              accessMode: ReadWriteOnce
              size: 5Gi
              storageClass: longhorn-ssd
    service:
      main:
        ports:
          http:
            port: *port
    persistence:
      media:
        enabled: true
        type: nfs
        server: "nas.toskbot.xyz"
        path: /mnt/user/data
        mountPath: /data
