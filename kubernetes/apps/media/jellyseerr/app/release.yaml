---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: jellyseerr
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 2.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  values:
    controllers:
      main:
        type: deployment
        containers:
          main:
            image:
              repository: docker.io/fallenbagel/jellyseerr
              tag: 1.8.1
            env:
              TZ: "America/New_York"
              LOG_LEVEL: "info"
            resources:
              requests:
                cpu: 10m
                memory: 50Mi
              limits:
                memory: 300Mi
                cpu: 200m
        pod:
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            fsGroup: 568
            fsGroupChangePolicy: "OnRootMismatch"
    service:
      main:
        ports:
          http:
            port: 5055
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: longhorn-ssd
        size: 10Gi
        globalMounts:
          - path: /app/config
