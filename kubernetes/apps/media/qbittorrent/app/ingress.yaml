apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: web-ui
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`qbit.kube.home.arpa`)
      kind: Rule
      services:
        - name: qbittorrent
          port: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qbittorrent-external-dns
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: qbit.kube.home.arpa
