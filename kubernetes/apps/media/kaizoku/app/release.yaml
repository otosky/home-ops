---
# yaml-language-server: $schema=https://kubernetes-schemas.kube.home.arpa/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: kaizoku
spec:
  chart:
    spec:
      chart: app-template
      version: 1.5.1
      interval: 5m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  interval: 5m
  values:
    initContainers:
      01-init-db:
        image: ghcr.io/onedr0p/postgres-initdb:14.8
        imagePullPolicy: IfNotPresent
        envFrom:
          - secretRef:
              name: kaizoku-secret
    controller:
      type: statefulset
      annotations:
        reloader.stakater.com/auto: "true"
    image:
      repository: ghcr.io/oae/kaizoku
      tag: v1.6.1
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: "OnRootMismatch"
    env:
      TZ: America/New_York
      KAIZOKU_PORT: 3000
      REDIS_HOST: redis-kaizoku-master.media.svc.cluster.local
      REDIS_PORT: 6379
    envFrom:
      - secretRef:
          name: kaizoku-secret
    service:
      main:
        ports:
          http:
            port: 3000
    volumeClaimTemplates:
      - name: config
        mountPath: /config
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: longhorn-ssd
    persistence:
      data:
        enabled: true
        type: nfs
        server: "nas.toskbot.xyz"
        path: /mnt/user/data/media/manga
        mountPath: /data
