---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: cluster-apps-komga
  namespace: flux-system
spec:
  path: ./kubernetes/apps/media/komga/app/
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-ops-kubernetes
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2beta1
      kind: HelmRelease
      name: komga
      namespace: media
  interval: 30m
  retryInterval: 1m
  timeout: 5m
