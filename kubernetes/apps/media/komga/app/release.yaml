---
# yaml-language-server: $schema=https://kubernetes-schemas.kube.home.arpa/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: komga
spec:
  chart:
    spec:
      chart: app-template
      version: 1.4.0
      interval: 5m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  interval: 5m
  values:
    controller:
      type: statefulset
      annotations:
        reloader.stakater.com/auto: "true"
    image:
      repository: ghcr.io/gotson/komga
      tag: 0.165.0
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: "OnRootMismatch"
    env:
      TZ: America/New_York
    service:
      main:
        ports:
          http:
            port: 8080
    volumeClaimTemplates:
      - name: config
        mountPath: /config
        accessMode: ReadWriteOnce
        size: 20Gi
        storageClass: longhorn-ssd
    persistence:
      data:
        enabled: true
        type: nfs
        server: "nas.home.arpa"
        path: /mnt/user/data/media/manga
        mountPath: /data
