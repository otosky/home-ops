---
# yaml-language-server: $schema=https://kubernetes-schemas.toskbot.xyz/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: komga
spec:
  chart:
    spec:
      chart: app-template
      version: 1.5.1
      interval: 5m
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
  interval: 5m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controller:
      type: statefulset
      annotations:
        reloader.stakater.com/auto: "true"
    image:
      repository: ghcr.io/gotson/komga
      tag: 1.2.0
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      fsGroupChangePolicy: "OnRootMismatch"
    env:
      TZ: America/New_York
      KOMGA_LIBRARIES_SCAN_CRON: "0 0 */2 * * ?"
    service:
      main:
        ports:
          http:
            port: 25600
    volumeClaimTemplates:
      - name: config
        mountPath: /config
        accessMode: ReadWriteOnce
        size: 20Gi
        storageClass: longhorn-ssd
    persistence:
      data:
        enabled: true
        type: nfs
        server: "nas.toskbot.xyz"
        path: /mnt/user/data/media/manga
        mountPath: /data
