--- 
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 5m 
  chart:
    spec:
      chart: cert-manager
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      version: "v1.13.3"
      interval: 5m
  install:
    crds: Create
  upgrade:
    crds: Create
  values:
    installCRDs: true
    dns01RecursiveNameservers: 1.1.1.1:53
    dns01RecursiveNameserversOnly: true
