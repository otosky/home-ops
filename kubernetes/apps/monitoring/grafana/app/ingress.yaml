apiVersion: traefik.containo.us/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  annotations:
    kubernetes.io/ingress.class: traefik-external
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`grafana.kube.home.arpa`)
      kind: Rule
      services:
        - name: grafana
          port: service
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-external-dns
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: grafana.kube.home.arpa
