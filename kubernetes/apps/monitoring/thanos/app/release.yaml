---
# yaml-language-server: $schema=https://kubernetes-schemas.toskbot.xyz/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: thanos
spec:
  interval: 15m
  chart:
    spec:
      chart: thanos
      version: 12.13.13
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    image:
      registry: quay.io
      repository: thanos/thanos
      tag: v0.32.5
    objstoreConfig:
      type: s3
      config:
        bucket: thanos
        endpoint: minio.minio.svc.cluster.local
        http_config:
          insecure_skip_verify: true
    queryFrontend:
      enabled: false
    query:
      enabled: true
      replicaCount: 2
      podAntiAffinityPreset: hard
      replicaLabel: ["__replica__"] # must match with kube-prometheus-stack value `.prometheus.prometheusSpec.replicaExternalLabelName`
      dnsDiscovery:
        sidecarsService: kube-prometheus-stack-thanos-discovery
        sidecarsNamespace: monitoring
    bucketweb:
      enabled: true
      replicaCount: 2
      podAntiAffinityPreset: hard
    compactor:
      enabled: true
      extraFlags: ["--compact.concurrency", "4"]
      retentionResolutionRaw: 7d
      retentionResolution5m: 14d
      retentionResolution1h: 30d
      persistence:
        enabled: true
        storageClass: local-path-ssd
        size: 20Gi
    storegateway:
      enabled: true
      replicaCount: 2
      podAntiAffinityPreset: hard
      persistence:
        enabled: true
        storageClass: local-path-ssd
        size: 20Gi
    ruler:
      enabled: true
      replicaCount: 2
      podAntiAffinityPreset: hard
      dnsDiscovery:
        enabled: true
      alertmanagers:
        [
          "http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093",
        ]
      extraFlags: ["--web.prefix-header=X-Forwarded-Prefix"]
      config: |-
        groups:
          - name: "PrometheusWatcher"
            rules:
              - alert: "PrometheusDown"
                expr: absent(up{job="kube-prometheus-stack-prometheus"})
      persistence:
        enabled: true
        storageClass: local-path-ssd
        size: 20Gi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  valuesFrom:
    # - targetPath: objstoreConfig.config.bucket
    #   kind: ConfigMap
    #   name: thanos-bucket-v1
    #   valuesKey: BUCKET_NAME
    # - targetPath: objstoreConfig.config.endpoint
    #   kind: ConfigMap
    #   name: thanos-bucket-v1
    #   valuesKey: BUCKET_HOST
    - targetPath: objstoreConfig.config.access_key
      kind: Secret
      name: thanos-secret
      valuesKey: AWS_ACCESS_KEY_ID
    - targetPath: objstoreConfig.config.secret_key
      kind: Secret
      name: thanos-secret
      valuesKey: AWS_SECRET_ACCESS_KEY
