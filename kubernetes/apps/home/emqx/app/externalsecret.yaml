---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: emqx
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: emqx-secret
    creationPolicy: Owner
  dataFrom:
    - extract:
        # DASHBOARD__DEFAULT_PASSWORD, AUTH__USER__1__USERNAME, AUTH__USER__1__PASSWORD
        key: emqx
