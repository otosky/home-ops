---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app syncthing
spec:
  interval: 15m
  chart:
    spec:
      chart: app-template
      version: 2.6.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s-charts
        namespace: flux-system
      interval: 15m
  install:
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    global:
      nameOverride: *app
    controllers:
      main:
        type: statefulset
        containers:
          main:
            image:
              repository: syncthing/syncthing
              tag: 1.27.8
            env:
              PUID: "1000"
              PGID: "1000"
        statefulset:
          volumeClaimTemplates:
            - name: config
              accessMode: ReadWriteOnce
              size: 5Gi
              storageClass: longhorn-ssd
              globalMounts:
                - path: /var/syncthing
    service:
      main:
        ports:
          http:
            port: 8384
      listdisc:
        enabled: true
        controller: main
        type: LoadBalancer
        loadBalancerIP: 10.66.1.106
        ports:
          discovery:
            enabled: true
            port: 21027
            protocol: UDP
          listen:
            enabled: true
            port: 22000
            protocol: TCP
