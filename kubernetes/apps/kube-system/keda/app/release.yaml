---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
spec:
  interval: 5m
  chart:
    spec:
      chart: keda
      sourceRef:
        kind: HelmRepository
        name: kedacore
        namespace: flux-system
      version: 2.16.1
      interval: 1m
  values:
    crds:
      install: true
    env:
      # https://github.com/kedacore/charts/issues/403
      - name: POD_NAMESPACE
        value: kube-system
