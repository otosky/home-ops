# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: temporal
spec:
  interval: 1h
  chart:
    spec:
      chart: temporal
      version: 1.1.1
      sourceRef:
        kind: HelmRepository
        name: temporal
        namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    server:
      namespaces:
      create: true
      namespace:
        - name: default
          retention: 3d
      additionalInitContainers:
        - name: init-db-default
          image: ghcr.io/home-operations/postgres-init:18.4.0
          imagePullPolicy: IfNotPresent
          env:
            - name: INIT_POSTGRES_DBNAME
              value: temporal
          envFrom:
            - secretRef:
                name: temporal-secret
        - name: init-db-visibility
          image: ghcr.io/home-operations/postgres-init:18.4.0
          imagePullPolicy: IfNotPresent
          env:
            - name: INIT_POSTGRES_DBNAME
              value: temporal_visibility
          envFrom:
            - secretRef:
                name: temporal-secret
      config:
        persistence:
          defaultStore: default
          visibilityStore: visibility
          numHistoryShards: 512
          datastores:
            default:
              sql: &sqlconn
                createDatabase: false
                manageSchema: true
                pluginName: postgres12
                driverName: postgres12
                connectAddr: "postgres-rw.database.svc.cluster.local:5432"
                connectProtocol: tcp
                databaseName: temporal
                user: temporal
                existingSecret: temporal-dbpass
                maxConns: 20
                maxIdleConns: 20
                maxConnLifetime: "1h"

            visibility:
              sql:
                createDatabase: false
                manageSchema: true
                pluginName: postgres12
                driverName: postgres12
                connectAddr: "postgres-rw.database.svc.cluster.local:5432"
                connectProtocol: tcp
                databaseName: temporal_visibility
                user: temporal
                existingSecret: temporal-dbpass
                maxConns: 20
                maxIdleConns: 20
                maxConnLifetime: "1h"
