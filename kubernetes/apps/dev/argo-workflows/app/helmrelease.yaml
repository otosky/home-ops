---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-workflows
spec:
  interval: 15m
  chart:
    spec:
      chart: argo-workflows
      version: 0.45.4
      sourceRef:
        kind: HelmRepository
        name: argo
        namespace: flux-system
      interval: 15m

  values:
    singleNamespace: true

    controller:
      image:
        registry: quay.io
        repository: argoproj/workflow-controller
        tag: v3.6.3@sha256:4c4f1c2d3b7d4fb002c84caa89792208f65571e9a3f587f73b801f06805c2934
      parallelism: 20
      resourceRateLimit:
        limit: 10
        burst: 1
      persistence:
        archive: true
        postgresql:
          host: postgres-rw.database.svc.cluster.local
          port: 5432
          database: argoproj
          tableName: argo_workflows
          # the database secrets must be in the same namespace of the controller
          userNameSecret:
            name: argo-workflows
            key: postgresql-user
          passwordSecret:
            name: argo-workflows
            key: postgresql-password


      namespaceParallelism: 10

      resources:
        requests:
          cpu: 10m
          memory: 100Mi
        limits:
          memory: 100Mi

    workflow:
      rbac:
        serviceAccounts:
          - name: argo-workflows-sa
            namespace: dev

    executor:
      image:
        registry: quay.io
        repository: argoproj/argoexec
        tag: v3.6.2@sha256:e940cb4364699724a6ca2b3541cfb4a226f1c2dbc233bf40a70ea5751fd11ef7

    server:
      enabled: true
      image:
        registry: quay.io
        repository: argoproj/argocli
        tag: v3.6.3@sha256:f9a8b558cd2a9bde043e820c5e4baf0b1fffbe04852c61f7dea86992861a4dea
      resources:
        requests:
          cpu: 10m
          memory: 100Mi
        limits:
          memory: 100Mi

      extraArgs:
        - --auth-mode=server

