---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-workflows
spec:
  interval: 15m
  chart:
    spec:
      chart: argo-workflows
      version: 0.45.15
      sourceRef:
        kind: HelmRepository
        name: argo
        namespace: flux-system
      interval: 15m

  values:
    singleNamespace: true

    controller:
      image:
        registry: quay.io
        repository: argoproj/workflow-controller
        tag: v3.6.7@sha256:76e5d841ed73a8752a10b818779f7893ee540f3c1f5db7ccddb5f20e7b676347
      parallelism: 20
      resourceRateLimit:
        limit: 10
        burst: 1
      persistence:
        archive: true
        postgresql:
          host: postgres-rw.database.svc.cluster.local
          port: 5432
          database: argoproj
          tableName: argo_workflows
          # the database secrets must be in the same namespace of the controller
          userNameSecret:
            name: argo-workflows
            key: postgresql-user
          passwordSecret:
            name: argo-workflows
            key: postgresql-password


      namespaceParallelism: 10

      resources:
        requests:
          cpu: 10m
          memory: 100Mi
        limits:
          memory: 100Mi

    workflow:
      rbac:
        serviceAccounts:
          - name: argo-workflows-sa
            namespace: dev

    executor:
      image:
        registry: quay.io
        repository: argoproj/argoexec
        tag: v3.6.7@sha256:795fa578f8df1a110e53e416473b83b726d2c874549a3456e5827e785b4420c8

    server:
      enabled: true
      image:
        registry: quay.io
        repository: argoproj/argocli
        tag: v3.6.10@sha256:0e8f3c2ca13ed0a5e58fa9bbb8ee5e1253c3e119b6959a44f3aff1e4151dc9b9
      resources:
        requests:
          cpu: 10m
          memory: 100Mi
        limits:
          memory: 100Mi

      extraArgs:
        - --auth-mode=server

