---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-workflows
spec:
  interval: 15m
  chart:
    spec:
      chart: argo-workflows
      version: 0.45.7
      sourceRef:
        kind: HelmRepository
        name: argo
        namespace: flux-system
      interval: 15m

  values:
    singleNamespace: true

    controller:
      image:
        registry: quay.io
        repository: argoproj/workflow-controller
        tag: v3.6.3@sha256:4c4f1c2d3b7d4fb002c84caa89792208f65571e9a3f587f73b801f06805c2934
      parallelism: 20
      resourceRateLimit:
        limit: 10
        burst: 1
      persistence:
        archive: true
        postgresql:
          host: postgres-rw.database.svc.cluster.local
          port: 5432
          database: argoproj
          tableName: argo_workflows
          # the database secrets must be in the same namespace of the controller
          userNameSecret:
            name: argo-workflows
            key: postgresql-user
          passwordSecret:
            name: argo-workflows
            key: postgresql-password


      namespaceParallelism: 10

      resources:
        requests:
          cpu: 10m
          memory: 100Mi
        limits:
          memory: 100Mi

    workflow:
      rbac:
        serviceAccounts:
          - name: argo-workflows-sa
            namespace: dev

    executor:
      image:
        registry: quay.io
        repository: argoproj/argoexec
        tag: v3.6.3@sha256:11a1a0b9b6857b6d3d4bd4de11cee5f7723e4003807b6a2f4e2e1a1b3292c8a7

    server:
      enabled: true
      image:
        registry: quay.io
        repository: argoproj/argocli
        tag: v3.6.4@sha256:9e1e54d94b5162d69ade244ea414aa172e409a56f629395e60f1d84a7bd9cfbc
      resources:
        requests:
          cpu: 10m
          memory: 100Mi
        limits:
          memory: 100Mi

      extraArgs:
        - --auth-mode=server

