---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-workflows
spec:
  interval: 15m
  chart:
    spec:
      chart: argo-workflows
      version: 0.45.10
      sourceRef:
        kind: HelmRepository
        name: argo
        namespace: flux-system
      interval: 15m

  values:
    singleNamespace: true

    controller:
      image:
        registry: quay.io
        repository: argoproj/workflow-controller
        tag: v3.6.4@sha256:12b0d436f8aef5f9684c4945301dcd4aea76e5cea8e5823b19e6934127485d0b
      parallelism: 20
      resourceRateLimit:
        limit: 10
        burst: 1
      persistence:
        archive: true
        postgresql:
          host: postgres-rw.database.svc.cluster.local
          port: 5432
          database: argoproj
          tableName: argo_workflows
          # the database secrets must be in the same namespace of the controller
          userNameSecret:
            name: argo-workflows
            key: postgresql-user
          passwordSecret:
            name: argo-workflows
            key: postgresql-password


      namespaceParallelism: 10

      resources:
        requests:
          cpu: 10m
          memory: 100Mi
        limits:
          memory: 100Mi

    workflow:
      rbac:
        serviceAccounts:
          - name: argo-workflows-sa
            namespace: dev

    executor:
      image:
        registry: quay.io
        repository: argoproj/argoexec
        tag: v3.6.5@sha256:ef6200b5f7631248a4b4bd95a755badb25e69bc476456767fa40ce0964bf25f1

    server:
      enabled: true
      image:
        registry: quay.io
        repository: argoproj/argocli
        tag: v3.6.4@sha256:9e1e54d94b5162d69ade244ea414aa172e409a56f629395e60f1d84a7bd9cfbc
      resources:
        requests:
          cpu: 10m
          memory: 100Mi
        limits:
          memory: 100Mi

      extraArgs:
        - --auth-mode=server

