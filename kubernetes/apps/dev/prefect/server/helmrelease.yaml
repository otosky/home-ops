---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app prefect-server
spec:
  chart:
    spec:
      chart: prefect-server
      version: 2024.10.31201029
      sourceRef:
        kind: HelmRepository
        name: prefect
        namespace: flux-system
  interval: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  driftDetection:
    mode: enabled
    ignore:
      - paths:
          - /spec/containers/resources/limits
        target:
          kind: Pod
  values:
    server:
      image:
        repository: prefecthq/prefect
        prefectTag: 3-python3.12-kubernetes
        debug: true

      prefectApiUrl: http://prefect-server.dev.svc.cluster.local:4200/api

      uiConfig:
        enabled: true
        prefectUiApiUrl: "https:prefect.toskbot.xyz/api"

      env:
        - name: PREFECT_API_DATABASE_MIGRATE_ON_START
          value: "True"

      # # Autoscaling configuration
      # # requests MUST be specified if using an HPA, otherwise the HPA will not know when to trigger a scale event
      # autoscaling:
      #   enabled: false
      #   minReplicas: 1
      #   maxReplicas: 100
      #   targetCPU: 80
      #   targetMemory: 80

      # # requests MUST be specified if using an HPA, otherwise the HPA will not know when to trigger a scale event
      # resources:
      #   requests:
      #     # cpu: 25m
      #     # memory: 105M
      #   limits:
      #     # memory: 105M

    postgresql:
      enabled: false
    secret:
      create: false
      name: prefect-postgresql-secret
