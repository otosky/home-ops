---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: gitea
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://dl.gitea.io/charts/
      chart: gitea
      version: 10.0.2
      sourceRef:
        kind: HelmRepository
        name: gitea
        namespace: flux-system
      interval: 5m
  values:
    image:
      repository: gitea/gitea
      tag: 1.21.3
      pullPolicy: IfNotPresent
  
    service:
      ssh:
        type: LoadBalancer
        port: 2222
        annotations:
          metallb.universe.tf/loadBalancerIPs: "${CLUSTER_EXTERNAL_SUBNET_PREFIX}.${CLUSTER_LB_GITEA}"
    ingress:
      enabled: false
    persistence:
      enabled: true
      create: false
      claimName: nfs-gitea

    redis-cluster:
      enabled: false
    postgresql-ha:
      enabled: false
    postgresql:
      enabled: false
    gitea:
      admin:
        existingSecret: gitea-admin-secret

      # See https://docs.gitea.io/en-us/config-cheat-sheet/
      config:
        APP_NAME: "Gitea: Git with a cup of tea"
        server:
          SSH_PORT : 2222
          SSH_LISTEN_PORT : 2222
        security:
          PASSWORD_COMPLEXITY: spec
        database:
          DB_TYPE: postgres
          HOST: postgres-rw.database.svc.cluster.local
          NAME: gitea
          USER: postgres
        service:
          REQUIRE_SIGNIN_VIEW: true
          DISABLE_REGISTRATION: true
          ENABLE_NOTIFY_MAIL: true
        openid:
          ENABLE_OPENID_SIGNIN: false
        oauth2:
          ENABLE_AUTO_REGISTRATION: true
          USERNAME: nickname 
          UPDATE_AVATAR: true
          ACCOUNT_LINKING: auto
        mailer:
          ENABLED: false
          HOST: ${CLUSTER_MAIL_SERVER}:${CLUSTER_MAIL_SERVER_PORT}
          IS_TLS_ENABLED: false
          FROM: "gitea@${CLUSTER_DOMAIN}"
          USER: ""
          PASSWD: ""
      additionalConfigFromEnvs:
        - name: GITEA__DATABASE__PASSWD
          valueFrom:
            secretKeyRef:
              name: gitea-postgres-secret
              key: GITEA__DATABASE__PASSWD
        - name: GITEA__SECURITY__SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: gitea-postgres-secret
              key: GITEA__SECURITY__SECRET_KEY
