---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: superset
spec:
  interval: 15m
  chart:
    spec:
      chart: superset
      version: 0.12.13
      sourceRef:
        kind: HelmRepository
        name: superset
        namespace: flux-system
  maxHistory: 3
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    postgresql:
      enabled: false
    secretEnv:
      create: false
    envFromSecret: superset
