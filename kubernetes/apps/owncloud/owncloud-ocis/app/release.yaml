---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: owncloud-ocis
spec:
  interval: 15m
  chart:
    spec:
      chart: ./charts/ocis
      sourceRef:
        kind: GitRepository
        name: owncloud-ocis
        namespace: flux-system
  values:
    image:
      repository: owncloud/ocis
      tag: 2.0.0
    insecure:
      oidcIdpInsecure: true
      ocisHttpApiInsecure: true
    externalDomain: owncloud.toskbot.xyz
    store:
      type: redis-sentinel
      nodes:
        - redis-headless.database.svc.cluster.local:26379/redis-master
    eventhistory:
      store:
        type: redis-sentinel
        nodes:
          - redis-headless.database.svc.cluster.local:26379/redis-master

